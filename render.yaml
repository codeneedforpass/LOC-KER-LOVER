services:
  - type: web
    name: loc-ker-lover
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set values manually in the Render dashboard — no Blueprint wiring.
      - key: VITE_APP_URL
        sync: false
      - key: VITE_APP_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_ONESIGNAL_APP_ID
        sync: false
